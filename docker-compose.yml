x-app-env: &app-env
  DB_CONNECTION: ${DB_CONNECTION:-pgsql}
  DB_HOST: ${DB_HOST:-postgres}
  DB_PORT: ${DB_PORT:-5432}
  DB_DATABASE: ${DB_DATABASE:-turno}
  DB_USERNAME: ${DB_USERNAME:-turno}
  DB_PASSWORD: ${DB_PASSWORD:-turno}
  CACHE_STORE: ${CACHE_STORE:-redis}
  SESSION_DRIVER: ${SESSION_DRIVER:-redis}
  QUEUE_CONNECTION: ${QUEUE_CONNECTION:-redis}
  REDIS_CLIENT: ${REDIS_CLIENT:-predis}
  REDIS_HOST: ${REDIS_HOST:-redis}
  REDIS_PORT: ${REDIS_PORT:-6379}
  REDIS_PASSWORD: ${REDIS_PASSWORD:-}
  REDIS_CACHE_DB: ${REDIS_CACHE_DB:-1}

services:
  postgres:
    image: postgres:16-alpine
    container_name: turno-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-turno}
      POSTGRES_USER: ${DB_USERNAME:-turno}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-turno}
    ports:
      - "${DB_PORT_EXTERNAL:-5432}:5432"
    volumes:
      - ./.docker/postgres/data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-turno} -d ${DB_DATABASE:-turno}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: turno-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT_EXTERNAL:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 5

  app:
    build:
      context: .
      dockerfile: .docker/php/Dockerfile
    container_name: turno-app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment: *app-env

  nginx:
    build:
      context: .
      dockerfile: .docker/nginx/Dockerfile
    container_name: turno-nginx
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-8080}:80"
    volumes:
      - .:/var/www/html
    depends_on:
      - app
