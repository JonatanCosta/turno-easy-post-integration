# Sample CI: runs the project test suites only (no deploy).
# Mirrors a minimal “tests on every push/PR” gate you would extend with lint, images, and deploy jobs.

name: Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

concurrency:
  group: tests-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  php:
    name: PHPUnit (Laravel)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, xml, ctype, dom, fileinfo, openssl, pdo, sqlite, tokenizer
          coverage: none

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Prepare environment
        run: cp .env.example .env && php artisan key:generate --force

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: npm

      - name: Install npm dependencies and build assets
        run: npm ci && npm run build

      - name: Run PHPUnit
        run: php artisan test

  frontend:
    name: Vitest (React)
    runs-on: ubuntu-latest
    env:
      # laravel-vite-plugin refuses the Vitest dev server in CI unless bypassed or assets are pre-built for prod.
      LARAVEL_BYPASS_ENV_CHECK: '1'
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Run Vitest
        run: npm run test
